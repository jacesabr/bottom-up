<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Chance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Cousine:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #d8d4c8;
    --ink: #2b2a26;
    --dim: #6d6a60;
    --warn: #7a4a2b;
    --bg: #0a0a0c;
    --panel: #141418;
    --line: #2a2a30;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--paper);
    font-family: 'Cousine', monospace;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* subtle film grain + vignette over the whole tube */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.66) 100%);
    pointer-events: none; z-index: 900;
  }

  #frame {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  /* top strip: day + death-toll ticker + mute */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
    flex-shrink: 0;
    z-index: 10;
  }
  #daybox {
    font-family: 'Special Elite', 'Cousine', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--paper);
    white-space: nowrap;
  }
  #daybox .date { color: var(--dim); font-size: 12px; letter-spacing: 1px; margin-left: 8px; }
  #ticker-wrap {
    flex: 1;
    overflow: hidden;
    height: 18px;
    position: relative;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    margin: 0 4px;
  }
  #ticker {
    position: absolute;
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--warn);
    top: 2px;
    will-change: transform;
  }
  #mute-btn {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    font-family: 'Cousine', monospace;
    font-size: 12px;
    padding: 3px 9px;
    cursor: pointer;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  #mute-btn:hover { border-color: var(--paper); color: var(--paper); }

  /* the canvas stage — the world */
  #stage {
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: #000;
  }
  #scene {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
  }

  /* fade-to-black night overlay */
  #nightfade {
    position: absolute; inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.3s ease;
    z-index: 5;
  }
  #nightfade.on { opacity: 1; }

  /* narration / dialogue caption box, lower third */
  #caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 14px 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0) 100%);
    z-index: 6;
    min-height: 78px;
  }
  #cap-text {
    font-size: 15px;
    line-height: 1.55;
    color: var(--paper);
    text-shadow: 0 1px 3px #000;
    max-width: 680px;
  }
  #cap-text.head {
    font-family: 'Special Elite', 'Cousine', monospace;
    font-size: 17px;
    letter-spacing: 0.5px;
  }
  #cap-text .frag { color: var(--dim); }

  /* choice / action bar */
  #choices {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: center;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
    background: var(--panel);
    flex-shrink: 0;
    min-height: 60px;
    z-index: 10;
  }
  .choice-btn {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--paper);
    font-family: 'Special Elite', 'Cousine', monospace;
    font-size: 14px;
    letter-spacing: 1.5px;
    padding: 11px 22px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
    text-transform: uppercase;
  }
  .choice-btn:hover {
    border-color: var(--paper);
    background: rgba(216,212,200,0.08);
  }
  .choice-btn .k {
    display: inline-block;
    font-family: 'Cousine', monospace;
    font-size: 11px;
    color: var(--dim);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 0 5px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .choice-btn:disabled { opacity: 0.35; cursor: default; }
  #choices .prompt {
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 1px;
    width: 100%;
    text-align: center;
    margin-bottom: 2px;
  }

  /* the irreversible "you had one chance" plate */
  #plate {
    position: absolute; inset: 0;
    background: #050505;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
    z-index: 20;
  }
  #plate.show { display: flex; }
  #plate h1 {
    font-family: 'Special Elite', 'Cousine', monospace;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--paper);
    margin-bottom: 18px;
    line-height: 1.4;
  }
  #plate .body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--dim);
    max-width: 460px;
    margin-bottom: 24px;
  }
  #plate .stamp {
    font-family: 'Special Elite', 'Cousine', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--warn);
    border: 1px solid var(--warn);
    padding: 8px 18px;
    transform: rotate(-3deg);
    opacity: 0.85;
  }

  #credit {
    position: absolute;
    left: 0; right: 0; bottom: 2px;
    text-align: center;
    color: #3a3a40;
    font-size: 10px;
    letter-spacing: 0.5px;
    z-index: 901;
    pointer-events: none;
  }

  @media (max-width: 540px) {
    #daybox { font-size: 13px; }
    #daybox .date { display: none; }
    .choice-btn { font-size: 12px; padding: 10px 14px; }
    #cap-text { font-size: 14px; }
  }
</style>
</head>
<body>

<div id="frame">
  <div id="topbar">
    <div id="daybox"><span id="day-label">DAY ONE</span><span class="date" id="day-date"></span></div>
    <div id="ticker-wrap"><div id="ticker"></div></div>
    <button id="mute-btn" title="toggle sound">[ &#9834; ]</button>
  </div>

  <div id="stage">
    <canvas id="scene"></canvas>
    <div id="nightfade"></div>
    <div id="caption"><div id="cap-text"></div></div>
    <div id="plate">
      <h1 id="plate-title"></h1>
      <div class="body" id="plate-body"></div>
      <div class="stamp">YOU HAD ONE CHANCE</div>
    </div>
  </div>

  <div id="choices"></div>

  <div id="credit">Tribute to One Chance by AwkwardSilenceGames (Dean Moynihan, 2010). Not affiliated.</div>
</div>

<script>
"use strict";
// ─────────────────────────────────────────────────────────────────────────────
//  ONE CHANCE — an original tribute. Dr. John Pilgrim. Six days. One save.
//  Single file: inline CSS + JS, one Google Fonts link, synthesized Web Audio,
//  procedural <canvas> scenes. Permanence via localStorage("onechance_state").
// ─────────────────────────────────────────────────────────────────────────────

// ── DOM ──────────────────────────────────────────────────────────────────────
const stage    = document.getElementById('stage');
const sceneCv  = document.getElementById('scene');
const capText  = document.getElementById('cap-text');
const capBox   = document.getElementById('caption');
const choices  = document.getElementById('choices');
const nightEl  = document.getElementById('nightfade');
const dayLabel = document.getElementById('day-label');
const dayDate  = document.getElementById('day-date');
const tickerEl = document.getElementById('ticker');
const plate    = document.getElementById('plate');
const plateTitle = document.getElementById('plate-title');
const plateBody  = document.getElementById('plate-body');

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Persistent state (the whole point) ───────────────────────────────────────
const SAVE_KEY = 'onechance_state';
let memFallback = null;          // used if storage is blocked
let storageOk = true;

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    storageOk = false;
    return memFallback;
  }
}
function saveState(s) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(s));
  } catch (e) {
    storageOk = false;
    memFallback = s;             // permanence lasts the session only
  }
}
function clearState() {
  try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
  memFallback = null;
}

// ?reset wipes the save for testing/review
const params = new URLSearchParams(location.search);
if (params.has('reset')) { clearState(); }

// quiet replay combo: press R three times within 1.2s
let rTaps = [];
window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    const now = Date.now();
    rTaps = rTaps.filter(t => now - t < 1200);
    rTaps.push(now);
    if (rTaps.length >= 3) { rTaps = []; clearState(); location.href = location.pathname; }
  }
});

// state shape: { choices: ['lab'|'home', ...], day: 0..6, done: bool, ending: key }
let state = loadState() || { choices: [], day: 0, done: false, ending: null };

// ── Audio (Web Audio API, synthesized; starts on first interaction) ──────────
let actx = null, masterGain = null, droneGain = null, droneOscs = [], muted = false;
let droneFilter = null;

function initAudio() {
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 0.85;
    masterGain.connect(actx.destination);
    startDrone();
    setDroneForDay(state.day);
  } catch (e) { actx = null; }
}

// a sparse, low, melancholy drone — a minor-ish stack that thins as the world dies
function startDrone() {
  if (!actx) return;
  droneGain = actx.createGain();
  droneGain.gain.value = 0.0;
  droneFilter = actx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.value = 360;
  droneGain.connect(droneFilter);
  droneFilter.connect(masterGain);
  // root, minor third-ish, octave
  [49, 58.27, 98].forEach((f, i) => {
    const o = actx.createOscillator();
    o.type = i === 2 ? 'sine' : 'triangle';
    o.frequency.value = f;
    const og = actx.createGain();
    og.gain.value = i === 2 ? 0.5 : 1;
    o.connect(og); og.connect(droneGain);
    o.start();
    droneOscs.push(o);
  });
  // very slow breathing of the filter
  const lfo = actx.createOscillator();
  const lfoGain = actx.createGain();
  lfo.frequency.value = 0.04;
  lfoGain.gain.value = 90;
  lfo.connect(lfoGain); lfoGain.connect(droneFilter.frequency);
  lfo.start();
  // ease the drone in
  droneGain.gain.setTargetAtTime(0.05, actx.currentTime, 2.0);
}

// the drone decays / dims as days pass (day 0 fullest, day 6 nearly gone)
function setDroneForDay(day) {
  if (!actx || !droneGain || !droneFilter) return;
  const t = Math.min(day, 6) / 6;
  const lvl = 0.06 * (1 - t * 0.78);       // fades toward silence
  droneGain.gain.setTargetAtTime(lvl, actx.currentTime, 1.5);
  droneFilter.frequency.setTargetAtTime(360 - t * 230, actx.currentTime, 1.5);
}

// soft bell/chime for day transitions
function chime(base = 523.25) {
  if (!actx || muted) return;
  const t = actx.currentTime;
  [base, base * 1.5, base * 2].forEach((f, i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    const peak = 0.06 / (i + 1);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + 0.02 + i * 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 2.2 + i * 0.3);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t + 2.6 + i * 0.3);
  });
}

// faint typewriter tick per character
let _noiseBuf = null;
function noiseBuffer() {
  if (_noiseBuf) return _noiseBuf;
  const len = Math.floor(actx.sampleRate * 0.03);
  _noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  const d = _noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _noiseBuf;
}
function tick() {
  if (!actx || muted) return;
  const t = actx.currentTime;
  const src = actx.createBufferSource();
  src.buffer = noiseBuffer();
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1600 + Math.random() * 500; bp.Q.value = 0.8;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.018, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.02);
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.03);
}
function softBlip(freq = 440, dur = 0.12, gain = 0.05) {
  if (!actx || muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(gain, actx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  o.connect(g); g.connect(masterGain);
  o.start(); o.stop(actx.currentTime + dur + 0.02);
}

document.getElementById('mute-btn').addEventListener('click', () => {
  muted = !muted;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.85;
  document.getElementById('mute-btn').innerHTML = muted ? '[ &#9788; ]' : '[ &#9834; ]';
});

// ── Caption typewriter ───────────────────────────────────────────────────────
let typing = false;
async function say(text, opts = {}) {
  const { head = false, instant = false } = opts;
  capText.className = head ? 'head' : '';
  capText.textContent = '';
  if (instant) { capText.textContent = text; return; }
  typing = true;
  for (let i = 0; i < text.length; i++) {
    capText.textContent += text[i];
    if (text[i] !== ' ') tick();
    await sleep(head ? 34 : 22);
  }
  typing = false;
}

// ── Day / world model ────────────────────────────────────────────────────────
// progress = 0 (day 1, world alive) .. 1 (day 6, world mostly dead).
// derived from how many days have passed. labs reached vs home days shape ending.
const DAY_WORDS = ['ONE','TWO','THREE','FOUR','FIVE','SIX'];
const DAY_DATES = [
  'MONDAY  ·  6 DAYS REMAIN',
  'TUESDAY  ·  5 DAYS REMAIN',
  'WEDNESDAY  ·  4 DAYS REMAIN',
  'THURSDAY  ·  3 DAYS REMAIN',
  'FRIDAY  ·  2 DAYS REMAIN',
  'SATURDAY  ·  THE LAST DAY'
];

// headlines escalate as the death toll climbs
const HEADLINES = [
  "THE CURE WORKS — AND IT WILL NOT STOP. Cellular collapse confirmed in lab specimens. Six days projected.",
  "QUARANTINE FAILS. The agent is airborne. Wildlife dying along the coast. Estimated 40 million lost.",
  "CROPS BROWNING NATIONWIDE. Birds fall from the sky over three continents. 900 million gone.",
  "OCEANS GO QUIET. No fish surface. Power grids failing as crews abandon posts. 2.4 billion gone.",
  "THE LAST BROADCASTS. Cities dark. The agent reaches the deep soil. Few of us remain.",
  "SILENCE. There is almost no one left to count. Today the world ends."
];

// rolling death toll for the ticker (billions feel abstract; we scale it)
const TOLLS = ['12,000', '41 MILLION', '903 MILLION', '2.4 BILLION', '5.9 BILLION', 'UNCOUNTABLE'];

function progress() { return Math.min(state.day, 5) / 5; }   // 0..1 across the 6 days

// ── Canvas scene engine ──────────────────────────────────────────────────────
const SW = 240, SH = 135;
sceneCv.width = SW; sceneCv.height = SH;
const ctx = sceneCv.getContext('2d');

// deterministic PRNG
function rng(seed) { let s = (seed >>> 0) || 1; return () => (s = (s * 1664525 + 1013904223) >>> 0) / 4294967296; }

// desaturate + darken a color toward grey as the world dies (amt 0..1)
function decay(r, g, b, amt) {
  const grey = 0.299 * r + 0.587 * g + 0.114 * b;
  r = r + (grey - r) * amt;
  g = g + (grey - g) * amt;
  b = b + (grey - b) * amt;
  const dark = 1 - amt * 0.45;          // also dims
  return `rgb(${(r*dark)|0},${(g*dark)|0},${(b*dark)|0})`;
}

let curAmt = 0;                          // current decay amount being drawn
function col(r, g, b) { return decay(r, g, b, curAmt); }
function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, Math.max(1,w|0), Math.max(1,h|0)); }
function px(x, y, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, 1, 1); }

// sky gradient that darkens with the days
function drawSky(amt, seed, indoor) {
  const r = rng(seed);
  curAmt = amt;
  // base sky: blue -> bruised grey -> near black
  for (let y = 0; y < SH; y++) {
    const t = y / SH;
    let R = 120 - t * 40, G = 165 - t * 60, B = 210 - t * 70;     // daytime blue
    // pull toward an ashen, smoky sky as the world dies
    R = R + (95 - R) * amt; G = G + (88 - G) * amt; B = B + (86 - B) * amt;
    const night = amt * amt * 0.5;
    R *= (1 - night); G *= (1 - night); B *= (1 - night);
    ctx.fillStyle = `rgb(${R|0},${G|0},${B|0})`;
    ctx.fillRect(0, y, SW, 1);
  }
  // a wan sun / smudge of light, lower and dimmer each day
  const sunY = 26 + amt * 22, sunX = SW * 0.74;
  const sunBright = 1 - amt * 0.8;
  for (let y = -10; y <= 10; y++) for (let x = -10; x <= 10; x++) {
    const d = Math.hypot(x, y);
    if (d <= 10 && r() < (1 - d/10)) {
      const R = 250*sunBright + 5, G = 240*sunBright, B = 200*sunBright;
      px(sunX + x, sunY + y, `rgb(${R|0},${G|0},${B|0})`);
    }
  }
  // drifting ash flecks once it gets bad
  if (amt > 0.25) {
    for (let i = 0; i < amt * 90; i++) px(r()*SW, r()*SH*0.8, amt > 0.6 ? '#3a3a3a' : '#555');
  }
}

// a small character: John, a stick-and-block figure walking; pose set by `step`
function drawPerson(x, groundY, scale, body, walk, step) {
  // body = base coat color [r,g,b]; head skin
  const s = scale;
  const cx = x;
  // legs (animate)
  const swing = walk ? Math.sin(step) * 2.2 : 0;
  rect(cx - 2*s, groundY - 4*s, 2*s, 4*s + swing*s*0.3, col(40,40,46));
  rect(cx, groundY - 4*s, 2*s, 4*s - swing*s*0.3, col(40,40,46));
  // torso (lab coat or coat)
  rect(cx - 3*s, groundY - 11*s, 6*s, 7*s, col(body[0], body[1], body[2]));
  // arms
  rect(cx - 4*s, groundY - 10*s, s, 5*s, col(body[0]*0.9, body[1]*0.9, body[2]*0.9));
  rect(cx + 3*s, groundY - 10*s, s, 5*s, col(body[0]*0.9, body[1]*0.9, body[2]*0.9));
  // head
  rect(cx - 2*s, groundY - 15*s, 4*s, 4*s, col(212, 178, 150));
  // hair
  rect(cx - 2*s, groundY - 15*s, 4*s, s, col(70, 55, 45));
}

// a simple house facade
function drawHouse(x, groundY, w, h, lit) {
  curAmt = curAmt;
  rect(x, groundY - h, w, h, col(150, 120, 96));           // wall
  // roof
  for (let i = 0; i < w/2; i++) rect(x + i, groundY - h - (w/2 - i), w - i*2, 1, col(120, 70, 56));
  // door
  rect(x + w/2 - 4, groundY - 16, 8, 16, col(86, 58, 40));
  px(x + w/2 + 2, groundY - 8, col(220, 200, 120));        // knob
  // windows — warm if lit, dark if not
  const wc = lit ? [255, 214, 130] : [60, 66, 74];
  rect(x + 6, groundY - h + 8, 9, 9, col(wc[0], wc[1], wc[2]));
  rect(x + w - 15, groundY - h + 8, 9, 9, col(wc[0], wc[1], wc[2]));
}

// a lab / facility facade
function drawLab(x, groundY, w, h) {
  rect(x, groundY - h, w, h, col(126, 132, 140));
  rect(x, groundY - h, w, 3, col(150, 156, 164));
  // banded windows
  for (let ry = groundY - h + 8; ry < groundY - 8; ry += 12) {
    for (let rx = x + 5; rx < x + w - 8; rx += 12) {
      rect(rx, ry, 8, 7, col(96, 150, 168));
    }
  }
  // doors
  rect(x + w/2 - 7, groundY - 18, 14, 18, col(70, 78, 86));
  rect(x + w/2 - 1, groundY - 18, 2, 18, col(40, 44, 50));
}

// a tree that wilts: green & full early, bare & grey late
function drawTree(x, groundY, amt, seed) {
  const r = rng(seed);
  rect(x - 1, groundY - 18, 3, 18, col(86, 62, 42));      // trunk
  const leaf = amt < 0.85;
  const canopyR = 11 * (1 - amt * 0.4);
  for (let y = -canopyR; y <= canopyR*0.7; y++) for (let xx = -canopyR; xx <= canopyR; xx++) {
    const d = Math.hypot(xx, y) / canopyR;
    if (d <= 1) {
      const keep = leaf ? (r() > amt * 0.85) : (r() < 0.12);    // foliage thins out
      if (keep) {
        if (leaf && r() > amt) px(x + xx, groundY - 20 + y, col(70 + r()*40, 120 - amt*40, 50));
        else px(x + xx, groundY - 20 + y, col(96, 80, 62));     // bare twigs
      }
    }
  }
  // fallen leaves on the ground late
  if (amt > 0.4) for (let i = 0; i < amt*14; i++) px(x - 12 + r()*24, groundY + r()*3, col(110, 90, 50));
}

// distant city skyline on the horizon
function drawSkyline(groundY, amt, seed) {
  const r = rng(seed);
  let bx = -4;
  while (bx < SW + 4) {
    const bw = 8 + (r() * 16 | 0);
    const bh = 10 + (r() * 34 | 0);
    rect(bx, groundY - bh, bw, bh, col(70, 78, 92));
    // lit windows — fewer as the world empties
    for (let wy = groundY - bh + 3; wy < groundY - 3; wy += 4)
      for (let wx = bx + 2; wx < bx + bw - 2; wx += 3)
        if (r() > 0.55 + amt * 0.42) px(wx, wy, col(245, 210, 120));
    bx += bw + 2;
  }
}

// ── Scene compositions ───────────────────────────────────────────────────────
// A "street" walk scene (used for transitions); johnX is the figure position.
let johnX = 30, johnTarget = 30, walking = false, stepPhase = 0;

function sceneStreet(amt, seed) {
  curAmt = amt;
  drawSky(amt, seed, false);
  const groundY = SH - 18;
  drawSkyline(groundY - 26, amt, seed + 1);
  // street
  rect(0, groundY, SW, SH - groundY, col(78, 80, 84));
  // pavement line
  for (let x = 4; x < SW; x += 16) rect(x, groundY + 7, 8, 2, col(150, 150, 150));
  // houses on the far left, lab implied on the right
  drawHouse(8, groundY, 40, 34, amt < 0.55);
  drawTree(64, groundY, amt, seed + 7);
  drawTree(120, groundY, amt, seed + 9);
  drawLab(180, groundY, 52, 40);
  // a few passers-by that thin out as people die
  const r = rng(seed + 50);
  const nPeople = Math.round(5 * (1 - amt));
  for (let i = 0; i < nPeople; i++) {
    const pxn = 70 + r() * 120;
    drawPerson(pxn, groundY, 1, [90 + r()*40, 90, 100], false, 0);
  }
  // John
  drawPerson(johnX, groundY, 1.3, [225, 228, 232], walking, stepPhase);
}

function sceneHome(amt, seed, withFamily) {
  curAmt = amt;
  // warm interior, dims with the days
  const r = rng(seed);
  for (let y = 0; y < SH; y++) {
    let R = 120, G = 92, B = 64;                 // warm lamp wall
    const t = y / SH;
    R -= t * 30; G -= t * 24; B -= t * 16;
    ctx.fillStyle = decay(R, G, B, amt);
    ctx.fillRect(0, y, SW, 1);
  }
  const groundY = SH - 22;
  rect(0, groundY, SW, SH - groundY, col(96, 66, 44));         // wood floor
  for (let x = 0; x < SW; x += 10) rect(x, groundY, 1, SH - groundY, col(74, 50, 34));
  // window showing the dying world outside
  rect(150, 20, 60, 46, col(40, 46, 58));
  curAmt = Math.min(1, amt + 0.15);
  drawSkyline(58, Math.min(1, amt + 0.2), seed + 3);
  curAmt = amt;
  rect(150, 20, 60, 1, col(60, 50, 40)); rect(150, 20, 1, 46, col(60,50,40));
  rect(209, 20, 1, 46, col(60,50,40)); rect(150, 66, 60, 1, col(60,50,40));
  rect(179, 20, 1, 46, col(60,50,40)); rect(150, 42, 60, 1, col(60,50,40));
  // a lamp
  rect(24, groundY - 40, 4, 30, col(60, 50, 44));
  const lampOn = amt < 0.9;
  for (let y = -7; y <= 0; y++) for (let x = -8; x <= 8; x++)
    if (Math.abs(x) + Math.abs(y)*1.6 < 9) px(26 + x, groundY - 44 + y, col(lampOn?250:90, lampOn?220:90, lampOn?150:96));
  // table
  rect(60, groundY - 12, 40, 4, col(120, 80, 52));
  rect(64, groundY - 12, 3, 12, col(100, 66, 42)); rect(93, groundY - 12, 3, 12, col(100,66,42));
  // John
  drawPerson(50, groundY, 1.2, [225, 228, 232], false, 0);
  if (withFamily) {
    // wife
    drawPerson(112, groundY, 1.2, [180, 90, 110], false, 0);
    // daughter (smaller)
    drawPerson(132, groundY, 0.8, [120, 150, 200], false, 0);
  }
}

function sceneLab(amt, seed) {
  curAmt = amt;
  // cold lab interior
  for (let y = 0; y < SH; y++) {
    let R = 60, G = 72, B = 84;
    const t = y / SH; R -= t*16; G -= t*18; B -= t*20;
    ctx.fillStyle = decay(R, G, B, amt);
    ctx.fillRect(0, y, SW, 1);
  }
  const groundY = SH - 20;
  rect(0, groundY, SW, SH - groundY, col(90, 96, 104));
  // benches
  rect(20, groundY - 16, 70, 5, col(150, 156, 162));
  rect(150, groundY - 16, 70, 5, col(150, 156, 162));
  // glassware / flasks glowing faint green
  const r = rng(seed);
  for (let i = 0; i < 6; i++) {
    const bx = 26 + i * 12;
    const glow = 1 - amt * 0.5;
    rect(bx, groundY - 26, 6, 10, col(120*glow, 200*glow, 150*glow));
    px(bx + 2, groundY - 28, col(160*glow, 230*glow, 170*glow));
  }
  // a monitor with a flatlining / scrolling readout
  rect(158, groundY - 30, 40, 22, col(20, 24, 28));
  const t = Date.now() / 200;
  for (let x = 0; x < 38; x++) {
    const yv = Math.sin((x + t) * 0.5) * 4 * (1 - amt);
    px(159 + x, groundY - 19 + yv, col(120, 230, 160));
  }
  // John at the bench
  drawPerson(110, groundY, 1.3, [225, 228, 232], false, 0);
}

// the very-end "aftermath" scene — barren, grey
function sceneAftermath(seed) {
  curAmt = 1;
  const r = rng(seed);
  for (let y = 0; y < SH; y++) {
    const v = 18 + (y / SH) * 14;
    ctx.fillStyle = `rgb(${v|0},${v|0},${(v+2)|0})`;
    ctx.fillRect(0, y, SW, 1);
  }
  const groundY = SH - 16;
  rect(0, groundY, SW, SH - groundY, '#2a2a2c');
  // dead trees
  drawTree(50, groundY, 1, seed + 2);
  drawTree(190, groundY, 1, seed + 4);
  // a thin pale light low on the horizon
  for (let x = 0; x < SW; x++) if (r() < 0.4) px(x, groundY - 1, '#3a3a3e');
}

// ── Render loop ──────────────────────────────────────────────────────────────
let sceneFn = () => sceneStreet(0, 1);
let sceneSeed = 1;
function setScene(fn, seed) { sceneFn = fn; sceneSeed = seed || sceneSeed; }
function frame() {
  ctx.clearRect(0, 0, SW, SH);
  // advance walk
  if (walking) {
    stepPhase += 0.35;
    const dir = Math.sign(johnTarget - johnX);
    johnX += dir * 1.4;
    if (Math.abs(johnTarget - johnX) < 2) { johnX = johnTarget; walking = false; }
  }
  sceneFn(sceneSeed);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function walkTo(targetX) {
  return new Promise(res => {
    johnTarget = targetX; walking = true;
    const iv = setInterval(() => { if (!walking) { clearInterval(iv); res(); } }, 60);
  });
}

// ── Ticker (death toll headline crawl) ───────────────────────────────────────
let tickerText = '';
let tickerX = 0, tickerW = 0;
function setTicker(text) {
  tickerText = text;
  tickerEl.textContent = text;
  tickerX = tickerWrapWidth();
  tickerW = tickerEl.offsetWidth;
}
function tickerWrapWidth() { return document.getElementById('ticker-wrap').offsetWidth; }
function animTicker() {
  if (tickerText) {
    tickerX -= 0.6;
    if (tickerX < -tickerW) tickerX = tickerWrapWidth();
    tickerEl.style.transform = `translateX(${tickerX}px)`;
  }
  requestAnimationFrame(animTicker);
}
requestAnimationFrame(animTicker);

// ── Choice buttons ───────────────────────────────────────────────────────────
function clearChoices() { choices.innerHTML = ''; }
function showChoices(list, prompt) {
  clearChoices();
  if (prompt) {
    const p = document.createElement('div');
    p.className = 'prompt'; p.textContent = prompt;
    choices.appendChild(p);
  }
  const btns = [];
  list.forEach(c => {
    const b = document.createElement('button');
    b.className = 'choice-btn';
    b.innerHTML = (c.key ? `<span class="k">${c.key}</span>` : '') + c.label;
    b.addEventListener('click', () => { if (!b.disabled) { onChoice(c, btns); } });
    choices.appendChild(b);
    btns.push({ btn: b, c });
  });
  // keyboard
  keyHandler = (e) => {
    const k = e.key.toUpperCase();
    const found = btns.find(o => o.c.key && o.c.key.toUpperCase() === k);
    if (found && !found.btn.disabled) { onChoice(found.c, btns); }
  };
  return btns;
}
let keyHandler = null;
window.addEventListener('keydown', (e) => { if (keyHandler) keyHandler(e); });

let choiceResolver = null;
function onChoice(c, btns) {
  if (!actx) initAudio();
  softBlip(330, 0.1, 0.05);
  btns.forEach(o => o.btn.disabled = true);
  keyHandler = null;
  const r = choiceResolver; choiceResolver = null;
  if (r) r(c.value);
}
function awaitChoice(list, prompt) {
  return new Promise(res => { choiceResolver = res; showChoices(list, prompt); });
}

// ── Night transition ─────────────────────────────────────────────────────────
async function nightFall() {
  nightEl.classList.add('on');
  await sleep(1300);
}
async function dayBreak() {
  nightEl.classList.remove('on');
  await sleep(1300);
}

// ── Header update ────────────────────────────────────────────────────────────
function updateHeader(dayIdx) {
  dayLabel.textContent = 'DAY ' + DAY_WORDS[dayIdx];
  dayDate.textContent = DAY_DATES[dayIdx];
  setTicker('☠  WORLD HEALTH EMERGENCY  ·  DEATH TOLL: ' + TOLLS[dayIdx] + '  ·  ' + HEADLINES[dayIdx] + '      ');
}

// ── A single day ─────────────────────────────────────────────────────────────
async function playDay(dayIdx) {
  state.day = dayIdx;
  saveState(state);
  const amt = dayIdx / 5;                       // decay 0 .. 1 across the six days
  updateHeader(dayIdx);
  setDroneForDay(dayIdx);
  chime(523.25 - dayIdx * 26);                  // chime lowers each day

  // establishing beat on the street
  johnX = 30; johnTarget = 30; walking = false;
  setScene((seed) => sceneStreet(amt, seed), 100 + dayIdx);
  await dayBreak();

  const labCount = state.choices.filter(c => c === 'lab').length;
  const homeCount = state.choices.filter(c => c === 'home').length;

  // a short narration line that reflects the deepening collapse
  const beats = [
    "Day one. The numbers on my screen do not lie. Six days. I keep the printout in my pocket like a verdict.",
    "Day two. The street is quieter. Mara held my hand at breakfast and didn't ask what the figures meant. She already knows.",
    "Day three. The trees are turning. Our daughter, Emily, drew the sun grey today. She said that's just its colour now.",
    "Day four. The shops are shut. People stopped pretending. I can hear how empty the world has become.",
    "Day five. Almost no one is left to be afraid. The light comes up thin and wrong. Two days. Then one.",
    "The last day. Whatever I have done with my time, I have done. This is the morning I was always walking toward."
  ];
  await say(beats[dayIdx], { head: false });
  await sleep(1600);

  // headline beat
  await say("HEADLINE — " + HEADLINES[dayIdx], { head: true });
  await sleep(1800);

  // THE CHOICE
  await say("One day. One choice. Where do you spend it?", { head: false });
  const choice = await awaitChoice([
    { key: 'L', label: 'Go to the Lab', value: 'lab' },
    { key: 'H', label: 'Stay Home', value: 'home' }
  ], "press  L  or  H  ·  or tap a button");

  clearChoices();
  state.choices.push(choice);
  saveState(state);

  // play the chosen scene as a short beat
  if (choice === 'lab') {
    // walk right, into the lab
    setScene((seed) => sceneStreet(amt, seed), 100 + dayIdx);
    await walkTo(196);
    await sleep(300);
    setScene((seed) => sceneLab(amt, seed), 300 + dayIdx);
    await labBeat(dayIdx, amt);
  } else {
    // walk left, home
    setScene((seed) => sceneStreet(amt, seed), 100 + dayIdx);
    await walkTo(20);
    await sleep(300);
    setScene((seed) => sceneHome(amt, seed, true), 400 + dayIdx);
    await homeBeat(dayIdx, amt);
  }

  await sleep(900);
  await say("Night falls.", { head: false });
  await nightFall();
}

// content for a day spent in the lab
async function labBeat(dayIdx, amt) {
  const labCount = state.choices.filter(c => c === 'lab').length;
  const lines = [
    "Fluorescent hum. Petri dishes. I push the team for a counter-agent — something to switch the cure off.",
    "We isolate the runaway protein. My hands shake. Every cell line we save dies by morning anyway.",
    "A breakthrough, maybe. A binding site. The clock on the wall is louder than the centrifuge.",
    "I sleep at the bench. I dream of Emily's grey sun. I wake and run the assay again.",
    "So close. The counter-agent holds — for an hour, then folds. I scream at no one.",
    "The final run. Whatever happens here, happens now."
  ];
  await say(lines[Math.min(dayIdx, 5)], { head: false });
  await sleep(1500);
  if (labCount >= 3) {
    await say("The data is real this time. The reaction stops. I could save what's left of the world.", { head: false });
    await sleep(1400);
  }
}

// content for a day spent at home
async function homeBeat(dayIdx, amt) {
  const lines = [
    "Mara makes coffee like the world isn't ending. Emily shows me a drawing of the three of us.",
    "We walk in the garden while there is still a garden. Emily names every flower before it wilts.",
    "We build a fort of cushions. Emily asks if the bad thing will go away. I hold her and lie.",
    "Mara and I dance in the kitchen to a radio that's mostly static now. Emily laughs at us.",
    "We watch the thin grey light from the window. Nobody says the word goodbye.",
    "The three of us, together, at the end. Emily's hand in mine. This is enough. This was always enough."
  ];
  await say(lines[Math.min(dayIdx, 5)], { head: false });
  await sleep(1600);
}

// ── Endings ──────────────────────────────────────────────────────────────────
// Decide which ending the pattern of choices earned.
function decideEnding() {
  const labCount = state.choices.filter(c => c === 'lab').length;
  const homeCount = state.choices.filter(c => c === 'home').length;
  const lastTwoHome = state.choices.slice(-2).every(c => c === 'home');

  // 1) Saviour, alone: 5-6 days in the lab. The cure is found; the family is lost.
  if (labCount >= 5) return 'saviour_alone';
  // 2) The cure, and his girl: 4 lab days but he came home at the very end.
  if (labCount >= 4 && lastTwoHome) return 'cure_and_family';
  // 3) Quiet human ending: spent (almost) every day at home. No cure, but not alone.
  if (homeCount >= 5) return 'quiet_human';
  // 4) Bittersweet balance: a roughly even split. No cure, but goodbyes were said.
  return 'bittersweet';
}

const ENDINGS = {
  saviour_alone: {
    scene: 'lab',
    title: "THE CURE",
    body: "On the sixth day the counter-agent held. The reaction stopped. The world — what was left of it — would live.\n\nYou drove home through empty streets. The lamp was off. The drawings were still on the fridge.\n\nMara and Emily had not waited for the cure. They had waited for you, and you did not come.\n\nYou saved everyone. You saved everyone but them.",
    end: "You had one chance."
  },
  cure_and_family: {
    scene: 'home',
    title: "ENOUGH",
    body: "You found it — late, but you found it. The cure would hold.\n\nAnd you came home in time. The last two days were theirs: cushion forts, the grey sun, Emily asleep on your chest as the world quietened.\n\nYou could not save the old world. You saved a piece of it, and you were there for the people who made it worth saving.\n\nIt is not a happy ending. It is the right one.",
    end: "You had one chance."
  },
  quiet_human: {
    scene: 'home',
    title: "TOGETHER",
    body: "You never found the cure. You stopped looking. There was nothing left to look with.\n\nInstead there were six days of small, unbearable, ordinary things. Coffee. A garden. A drawing of three people holding hands.\n\nThe world ended on schedule. You did not spend it in a lab. You spent it with them, and Emily was not afraid, because you were there.\n\nThere are worse ways to lose everything.",
    end: "You had one chance."
  },
  bittersweet: {
    scene: 'street',
    title: "THE LONG WALK",
    body: "You split your last days between the bench and the kitchen table. You never found the cure — close, but never enough.\n\nStill, you said the things that needed saying. Mara knew. Emily knew. You were not a stranger when the end came.\n\nHalf a scientist, half a father, and at the end, fully neither and fully both.\n\nThe world went dark, and you were not alone, and you had tried.",
    end: "You had one chance."
  }
};

// a special grim variant: if the player abandoned the family entirely AND came home
// only to a dark house at the very end — handled inside saviour_alone above.

async function playEnding() {
  const key = decideEnding();
  state.ending = key;
  state.done = true;
  saveState(state);
  const e = ENDINGS[key];

  // final establishing scene
  if (e.scene === 'lab') setScene((seed) => sceneLab(1, seed), 999);
  else if (e.scene === 'home') {
    const survived = (key === 'cure_and_family' || key === 'quiet_human');
    setScene((seed) => sceneHome(1, seed, survived), 998);
  } else setScene((seed) => sceneAftermath(seed), 997);

  setDroneForDay(6);
  updateHeader(5);
  setTicker('☠  THE SIXTH DAY  ·  ' + e.title + '      ');
  await dayBreak();
  await sleep(600);

  // narrate the ending
  await say(e.title, { head: true });
  await sleep(1400);
  for (const para of e.body.split('\n\n')) {
    await say(para, { head: false });
    await sleep(2200);
  }
  await sleep(800);
  await nightFall();
  await sleep(600);
  showPlate(e);
}

// the permanent plate (also shown on every reload after completion)
function showPlate(e) {
  capBox.style.display = 'none';
  clearChoices();
  plateTitle.textContent = e.title;
  let body = e.body;
  plateBody.textContent = e.end + '\n\n' + body.split('\n\n')[0] + '\n\n' +
    (storageOk ? "" : "(storage was blocked — this ending lasts only this session.)");
  plate.classList.add('show');
  chime(392);
}

// ── Boot / resume logic ──────────────────────────────────────────────────────
async function boot() {
  // resume the saved game wherever it left off — THIS is the permanence
  if (state.done && state.ending) {
    // already finished — show the earned aftermath, no replay
    const e = ENDINGS[state.ending] || ENDINGS.bittersweet;
    if (e.scene === 'lab') setScene((seed) => sceneLab(1, seed), 999);
    else if (e.scene === 'home') {
      const survived = (state.ending === 'cure_and_family' || state.ending === 'quiet_human');
      setScene((seed) => sceneHome(1, seed, survived), 998);
    } else setScene((seed) => sceneAftermath(seed), 997);
    updateHeader(5);
    setTicker('☠  IT IS OVER  ·  ' + e.title + '      ');
    nightEl.classList.remove('on');
    showPlate(e);
    return;
  }

  // title / first interaction gate (audio needs a gesture)
  setScene((seed) => sceneStreet(0, seed), 100);
  nightEl.classList.add('on');
  capBox.style.display = '';
  capText.className = 'head';
  capText.textContent = 'ONE CHANCE';
  await sleep(200);

  const resuming = state.choices.length > 0 && !state.done;
  await awaitChoice(
    [{ key: 'B', label: resuming ? 'Continue' : 'Begin', value: 'go' }],
    resuming
      ? `Dr. John Pilgrim · day ${state.choices.length + 1} of 6 · your choices stand`
      : "Dr. John Pilgrim · 6 days remain · every choice is permanent"
  );
  initAudio();
  clearChoices();

  await say("I am Dr. John Pilgrim. My team found the cure for cancer on a Sunday night.", { head: false });
  await sleep(2000);
  await say("By Monday we understood what we had really made. It does not stop at the tumour. It does not stop at all.", { head: false });
  await sleep(2400);
  await say("It will unmake every living cell on Earth. We have six days. I have six choices. This is the only run I get.", { head: false });
  await sleep(2600);
  await dayBreak();

  // play remaining days from where the save left off
  const startDay = state.choices.length;   // 0..5
  for (let d = startDay; d < 6; d++) {
    await playDay(d);
  }
  await playEnding();
}

boot();
</script>
