<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Execution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #b9bcc0;
    --ink-dim: #6f747a;
    --paper: #0a0b0d;
  }

  html, body {
    height: 100%;
    background: #000;
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  /* the canvas keeps the scene aspect, letterboxed inside the iframe */
  #scene {
    display: block;
    image-rendering: auto;
    background: #15171b;
    max-width: 100%;
    max-height: 100%;
  }

  /* film grain + vignette layered over everything */
  #grain, #vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }
  #vignette {
    background: radial-gradient(ellipse 75% 70% at 50% 46%, transparent 40%, rgba(0,0,0,0.55) 82%, rgba(0,0,0,0.9) 100%);
  }
  #grain { opacity: 0.05; mix-blend-mode: overlay; }

  /* the single damning line of text, centred low */
  #caption {
    position: fixed;
    left: 0; right: 0;
    bottom: 14%;
    text-align: center;
    z-index: 60;
    pointer-events: none;
    padding: 0 8vw;
  }
  #caption .ln {
    display: block;
    font-size: clamp(15px, 2.6vw, 24px);
    line-height: 1.55;
    letter-spacing: 0.3px;
    color: var(--ink);
    opacity: 0;
    transition: opacity 2.4s ease;
    text-shadow: 0 2px 14px rgba(0,0,0,0.95);
  }
  #caption .ln.show { opacity: 0.92; }
  #caption .ln.dim  { color: var(--ink-dim); font-style: italic; font-size: clamp(12px, 1.9vw, 17px); }

  /* mute, top-right — barely there */
  #mute {
    position: fixed;
    top: 12px; right: 14px;
    z-index: 70;
    background: transparent;
    border: 1px solid rgba(150,154,160,0.25);
    color: var(--ink-dim);
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    line-height: 1;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.3s;
  }
  #mute:hover { opacity: 0.9; }

  /* on-screen affordances for touch — discovered, not announced. Faint. */
  .touchctl {
    position: fixed;
    z-index: 65;
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 1.2s ease;
    cursor: pointer;
    pointer-events: auto;
    user-select: none;
  }
  .touchctl.show { opacity: 0.32; }
  .touchctl:active { opacity: 0.7; }
  #ctl-leave {
    left: 16px;
    bottom: 16px;
    padding: 10px 14px;
  }
  #ctl-fire {
    right: 16px;
    bottom: 16px;
    padding: 10px 14px;
  }
  /* a wide invisible strip over the gun for tap-to-fire on mobile */
  #fire-hot {
    position: fixed;
    z-index: 64;
    pointer-events: auto;
    cursor: crosshair;
  }

  /* the credit line, permanent, dim, very small */
  #credit {
    position: fixed;
    left: 0; right: 0;
    bottom: 5px;
    text-align: center;
    z-index: 70;
    font-size: 10px;
    letter-spacing: 0.4px;
    color: rgba(120,124,130,0.4);
    pointer-events: none;
  }

  /* a slow fade-to-black overlay used for the walk-off and for reload framing */
  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 80;
    pointer-events: none;
    opacity: 1;
    transition: opacity 2.6s ease;
  }
  #fade.clear { opacity: 0; }
  #fade.black { opacity: 1; }

  @media (max-height: 420px) {
    #caption { bottom: 20%; }
  }
</style>
</head>
<body>

<div id="stage">
  <canvas id="scene" width="640" height="400"></canvas>
</div>

<canvas id="grain" width="160" height="160"></canvas>
<div id="vignette"></div>

<div id="caption"></div>

<div id="fire-hot"></div>
<div id="ctl-leave" class="touchctl">&#8592; walk away</div>
<div id="ctl-fire" class="touchctl">fire</div>

<button id="mute" title="sound">&#9834;</button>

<div id="fade" class="black"></div>

<div id="credit">Tribute to Execution by Jesse Venbrux (2008). Not affiliated.</div>

<script>
"use strict";

// ── Safe storage (iframes / embeds sometimes block localStorage) ───────────────
const STORE_KEY = "execution_outcome";
const mem = { v: null };
const storage = (() => {
  try {
    const t = "__exec_test__";
    window.localStorage.setItem(t, "1");
    window.localStorage.removeItem(t);
    return {
      get() { try { return window.localStorage.getItem(STORE_KEY); } catch (e) { return mem.v; } },
      set(v) { try { window.localStorage.setItem(STORE_KEY, v); } catch (e) { mem.v = v; } },
      clear() { try { window.localStorage.removeItem(STORE_KEY); } catch (e) {} mem.v = null; }
    };
  } catch (e) {
    // blocked — fall back to in-memory for this session only
    return {
      get() { return mem.v; },
      set(v) { mem.v = v; },
      clear() { mem.v = null; }
    };
  }
})();

// ?reset wipes the saved outcome so the choice is offered again (for review/replay)
let resetRequested = false;
try {
  const q = (window.location.search || "").toLowerCase();
  if (q.indexOf("reset") !== -1) { storage.clear(); resetRequested = true; }
} catch (e) {}

// ── DOM ────────────────────────────────────────────────────────────────────────
const cv      = document.getElementById("scene");
const ctx     = cv.getContext("2d");
const grainCv = document.getElementById("grain");
const gctx    = grainCv.getContext("2d");
const captionEl = document.getElementById("caption");
const ctlLeave  = document.getElementById("ctl-leave");
const ctlFire   = document.getElementById("ctl-fire");
const fireHot   = document.getElementById("fire-hot");
const fadeEl    = document.getElementById("fade");
const muteBtn   = document.getElementById("mute");

// logical scene size (canvas is upscaled by CSS but drawn at this resolution)
const W = cv.width, H = cv.height;

// ── Palette — overcast war-photograph: greys + a sickly pale sky ────────────────
const COL = {
  skyTop:   "#3a3d42",
  skyBot:   "#5c5f63",
  skyHaze:  "#73757a",
  groundTop:"#34352f",
  groundBot:"#1d1e1a",
  postDark: "#23211c",
  postLite: "#3a362d",
  figure:   "#101012",
  figureLt: "#1b1b1f",
  blood:    "#3a1416",
  soldier:  "#0d0d10",
  metal:    "#2a2c30"
};

// ── State ───────────────────────────────────────────────────────────────────────
const MODE = { INTRO: 0, PLAY: 1, SHOT: 2, WALK: 3, DEAD_PERM: 4, MERCY_PERM: 5 };
let mode = MODE.INTRO;
let decided = false;            // a choice has been locked this session

// the soldier stands to the right; can walk further right and off-screen
let soldierX = W - 96;
const SOLDIER_GROUND = H - 70;
const SOLDIER_START = W - 96;
let walking = 0;                // -1 left, +1 right, 0 still
let muzzle = 0;                 // muzzle-flash timer
let prisonerDead = false;
let slump = 0;                  // 0..1 how far the body has slumped
let bloodShown = false;
let t0 = performance.now();
let started = false;            // first user interaction happened (audio unlocked)
let rKeyTimes = [];             // for the secret "R R R" reset combo

// post + prisoner position (left third)
const POST_X = Math.round(W * 0.30);
const POST_TOP = H - 200;
const POST_BASE = H - 64;
const FIG_CX = POST_X;
const FIG_HEAD_Y = POST_TOP + 26;

// ── Audio (Web Audio synth — wind ambiance + a single sharp gunshot) ────────────
let actx = null, master = null, windGain = null, muted = false, windNodes = [];

function initAudio() {
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    master = actx.createGain();
    master.gain.value = muted ? 0 : 1;
    master.connect(actx.destination);
    startWind();
  } catch (e) { actx = null; }
}

// wind = filtered noise, slowly swelling, with a low mournful drone underneath
function startWind() {
  if (!actx) return;
  const len = Math.floor(actx.sampleRate * 2);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = actx.createBufferSource();
  src.buffer = buf; src.loop = true;

  const lp = actx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = 520; lp.Q.value = 0.6;

  windGain = actx.createGain();
  windGain.gain.value = 0.0;
  src.connect(lp); lp.connect(windGain); windGain.connect(master);
  src.start();

  // slow swell of the wind volume
  const lfo = actx.createOscillator();
  const lfoG = actx.createGain();
  lfo.type = "sine"; lfo.frequency.value = 0.06;
  lfoG.gain.value = 0.022;
  lfo.connect(lfoG); lfoG.connect(windGain.gain);
  lfo.start();
  windGain.gain.value = 0.030;

  // sweep the filter for movement in the gusts
  const flfo = actx.createOscillator();
  const flfoG = actx.createGain();
  flfo.type = "sine"; flfo.frequency.value = 0.09;
  flfoG.gain.value = 240;
  flfo.connect(flfoG); flfoG.connect(lp.frequency);
  flfo.start();

  // a low drone — the held breath of the field
  const o = actx.createOscillator();
  const og = actx.createGain();
  o.type = "sine"; o.frequency.value = 48;
  og.gain.value = 0.018;
  o.connect(og); og.connect(master);
  o.start();

  windNodes = [src, lfo, flfo, o];
}

// a single sharp gunshot — noise crack + a deep body thump + a long tail
function gunshot() {
  if (!actx) return;
  const t = actx.currentTime;

  // sharp transient crack (short white-noise burst, highpassed)
  const len = Math.floor(actx.sampleRate * 0.5);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) {
    const env = Math.pow(1 - i / len, 6);
    d[i] = (Math.random() * 2 - 1) * env;
  }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const hp = actx.createBiquadFilter();
  hp.type = "highpass"; hp.frequency.value = 800;
  const cg = actx.createGain();
  cg.gain.setValueAtTime(muted ? 0 : 0.95, t);
  src.connect(hp); hp.connect(cg); cg.connect(master);
  src.start(t); src.stop(t + 0.5);

  // deep thump (the report rolling across the field)
  const o = actx.createOscillator();
  const og = actx.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(38, t + 0.25);
  og.gain.setValueAtTime(muted ? 0 : 0.9, t);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
  o.connect(og); og.connect(master);
  o.start(t); o.stop(t + 0.5);

  // a brief mid-body knock
  const o2 = actx.createOscillator();
  const o2g = actx.createGain();
  o2.type = "triangle"; o2.frequency.value = 90;
  o2g.gain.setValueAtTime(muted ? 0 : 0.4, t);
  o2g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o2.connect(o2g); o2g.connect(master);
  o2.start(t); o2.stop(t + 0.2);

  // long reverberant tail (filtered noise decaying — the echo off nothing)
  const tlen = Math.floor(actx.sampleRate * 1.6);
  const tbuf = actx.createBuffer(1, tlen, actx.sampleRate);
  const td = tbuf.getChannelData(0);
  for (let i = 0; i < tlen; i++) td[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / tlen, 2.4);
  const tsrc = actx.createBufferSource();
  tsrc.buffer = tbuf;
  const tlp = actx.createBiquadFilter();
  tlp.type = "lowpass"; tlp.frequency.value = 900;
  const tg = actx.createGain();
  tg.gain.setValueAtTime(muted ? 0 : 0.22, t + 0.02);
  tg.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
  tsrc.connect(tlp); tlp.connect(tg); tg.connect(master);
  tsrc.start(t + 0.01); tsrc.stop(t + 1.6);
}

muteBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  muted = !muted;
  if (master) master.gain.value = muted ? 0 : 1;
  muteBtn.innerHTML = muted ? "&#9788;" : "&#9834;";
  muteBtn.title = muted ? "muted" : "sound";
});

// ── Caption ──────────────────────────────────────────────────────────────────────
function showCaption(lines) {
  captionEl.innerHTML = "";
  lines.forEach((ln, i) => {
    const el = document.createElement("div");
    el.className = "ln" + (ln.dim ? " dim" : "");
    el.textContent = ln.text;
    captionEl.appendChild(el);
    setTimeout(() => el.classList.add("show"), 300 + i * 1100);
  });
}
function clearCaption() {
  captionEl.querySelectorAll(".ln").forEach(el => el.classList.remove("show"));
}

// ── Deterministic noise for the grain texture ──────────────────────────────────
function paintGrain() {
  const img = gctx.createImageData(grainCv.width, grainCv.height);
  const dd = img.data;
  for (let i = 0; i < dd.length; i += 4) {
    const v = (Math.random() * 255) | 0;
    dd[i] = dd[i+1] = dd[i+2] = v;
    dd[i+3] = 255;
  }
  gctx.putImageData(img, 0, 0);
}

// ── Scene rendering ──────────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  g.addColorStop(0, COL.skyTop);
  g.addColorStop(0.7, COL.skyBot);
  g.addColorStop(1, COL.skyHaze);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.62);

  // a pale, sickly sun-smear low on the horizon
  const sx = W * 0.62, sy = H * 0.5;
  const rg = ctx.createRadialGradient(sx, sy, 4, sx, sy, 150);
  rg.addColorStop(0, "rgba(190,188,178,0.30)");
  rg.addColorStop(1, "rgba(190,188,178,0)");
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H * 0.62);
}

function drawGround() {
  const g = ctx.createLinearGradient(0, H * 0.58, 0, H);
  g.addColorStop(0, COL.groundTop);
  g.addColorStop(1, COL.groundBot);
  ctx.fillStyle = g;
  ctx.fillRect(0, H * 0.58, W, H * 0.42);

  // sparse dead tufts of grass — same every frame (seeded by index)
  ctx.strokeStyle = "rgba(30,30,26,0.7)";
  ctx.lineWidth = 1;
  for (let i = 0; i < 90; i++) {
    const px = ((i * 97 + 31) % W);
    const py = H * 0.6 + ((i * 53) % (H * 0.4));
    const hgt = 3 + (i % 5);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + ((i % 3) - 1), py - hgt);
    ctx.stroke();
  }
  // a low dark treeline smudge on the horizon
  ctx.fillStyle = "rgba(20,21,18,0.55)";
  ctx.beginPath();
  ctx.moveTo(0, H * 0.58);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, H * 0.58 - (6 + Math.sin(x * 0.05) * 5 + ((x * 7) % 9)));
  }
  ctx.lineTo(W, H * 0.62); ctx.lineTo(0, H * 0.62);
  ctx.closePath(); ctx.fill();
}

function drawPost() {
  // a thin wooden post planted in the field
  ctx.fillStyle = COL.postDark;
  ctx.fillRect(POST_X - 6, POST_TOP, 12, POST_BASE - POST_TOP);
  ctx.fillStyle = COL.postLite;
  ctx.fillRect(POST_X - 6, POST_TOP, 4, POST_BASE - POST_TOP); // grain highlight
  // a crossbar near the top (where wrists are bound)
  ctx.fillStyle = COL.postDark;
  ctx.fillRect(POST_X - 22, POST_TOP + 14, 44, 7);
  // shadow pooling at the base
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.beginPath();
  ctx.ellipse(POST_X, POST_BASE + 2, 26, 7, 0, 0, Math.PI * 2);
  ctx.fill();
}

// the prisoner — bound to the post. `s` = slump amount (0 standing, 1 collapsed/dead)
function drawPrisoner(s) {
  const cx = FIG_CX;
  // when dead, the body sags down and the head drops forward
  const headDrop = s * 30;
  const bodyDrop = s * 16;
  const tilt = s * 0.5;

  ctx.save();
  ctx.fillStyle = COL.figure;

  // bound arms reaching up to the crossbar (stay up even in death)
  ctx.strokeStyle = COL.figure;
  ctx.lineWidth = 6;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx - 7, FIG_HEAD_Y + 18 + bodyDrop);
  ctx.lineTo(cx - 18, POST_TOP + 17);
  ctx.moveTo(cx + 7, FIG_HEAD_Y + 18 + bodyDrop);
  ctx.lineTo(cx + 18, POST_TOP + 17);
  ctx.stroke();

  // torso
  ctx.beginPath();
  ctx.moveTo(cx - 11, FIG_HEAD_Y + 14 + bodyDrop);
  ctx.lineTo(cx + 11, FIG_HEAD_Y + 14 + bodyDrop);
  ctx.lineTo(cx + 9, FIG_HEAD_Y + 58 + bodyDrop * 1.4);
  ctx.lineTo(cx - 9, FIG_HEAD_Y + 58 + bodyDrop * 1.4);
  ctx.closePath();
  ctx.fill();

  // legs, sagging when dead
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(cx - 5, FIG_HEAD_Y + 56 + bodyDrop * 1.4);
  ctx.lineTo(cx - 7 - s * 4, POST_BASE - 2);
  ctx.moveTo(cx + 5, FIG_HEAD_Y + 56 + bodyDrop * 1.4);
  ctx.lineTo(cx + 7 + s * 2, POST_BASE - 2);
  ctx.stroke();

  // head — bowed forward and to the side when dead
  ctx.save();
  ctx.translate(cx, FIG_HEAD_Y + headDrop);
  ctx.rotate(tilt);
  ctx.beginPath();
  ctx.arc(0, 0, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.restore();

  // a dark stain at the chest once shot
  if (bloodShown) {
    ctx.fillStyle = COL.blood;
    ctx.beginPath();
    ctx.ellipse(cx + 2, FIG_HEAD_Y + 30 + bodyDrop, 6, 9, 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// the empty post — prisoner gone (mercy / freed state)
function drawEmptyPost() {
  // a cut rope dangling from the crossbar — they were freed
  ctx.strokeStyle = "rgba(120,110,90,0.6)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(POST_X - 14, POST_TOP + 18);
  ctx.lineTo(POST_X - 16, POST_TOP + 34);
  ctx.moveTo(POST_X + 14, POST_TOP + 18);
  ctx.lineTo(POST_X + 12, POST_TOP + 30);
  ctx.stroke();
}

// the soldier/executioner, standing side-on, holding a rifle pointed at the post
function drawSoldier(x) {
  const gy = SOLDIER_GROUND;
  ctx.save();
  ctx.fillStyle = COL.soldier;

  // long shadow
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath();
  ctx.ellipse(x, gy + 30, 22, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COL.soldier;
  // legs (slight stance)
  ctx.fillRect(x - 7, gy, 5, 30);
  ctx.fillRect(x + 2, gy + 2, 5, 28);
  // torso / coat
  ctx.beginPath();
  ctx.moveTo(x - 9, gy - 34);
  ctx.lineTo(x + 9, gy - 34);
  ctx.lineTo(x + 8, gy + 4);
  ctx.lineTo(x - 8, gy + 4);
  ctx.closePath();
  ctx.fill();
  // head + cap
  ctx.beginPath();
  ctx.arc(x, gy - 42, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(x - 9, gy - 50, 18, 4); // cap brim

  // the rifle — held level, pointing LEFT toward the post
  ctx.strokeStyle = COL.metal;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x - 2, gy - 22);
  ctx.lineTo(x - 40, gy - 24); // barrel toward the prisoner
  ctx.stroke();
  // arms bracing the rifle
  ctx.strokeStyle = COL.soldier;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(x + 2, gy - 30);
  ctx.lineTo(x - 14, gy - 23);
  ctx.moveTo(x - 6, gy - 32);
  ctx.lineTo(x - 30, gy - 24);
  ctx.stroke();

  // muzzle flash
  if (muzzle > 0) {
    const fx = x - 42, fy = gy - 24;
    const a = muzzle;
    ctx.fillStyle = "rgba(255,236,180," + (0.9 * a) + ")";
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx - 16 * a, fy - 6 * a);
    ctx.lineTo(fx - 22 * a, fy);
    ctx.lineTo(fx - 16 * a, fy + 6 * a);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255," + (0.8 * a) + ")";
    ctx.beginPath();
    ctx.arc(fx, fy, 4 * a, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ── The whole frame ──────────────────────────────────────────────────────────────
function render() {
  drawSky();
  drawGround();
  drawPost();

  if (mode === MODE.MERCY_PERM) {
    drawEmptyPost();
  } else if (mode === MODE.DEAD_PERM) {
    bloodShown = true;
    drawPrisoner(1);
  } else {
    drawPrisoner(slump);
  }

  // soldier is present while there's still a choice (intro/play/shot); gone in the
  // permanent states and after walking off
  if (mode === MODE.INTRO || mode === MODE.PLAY || mode === MODE.SHOT) {
    if (soldierX < W + 60) drawSoldier(soldierX);
  }
}

// ── Loop ─────────────────────────────────────────────────────────────────────────
let last = performance.now();
function frame(now) {
  const dt = Math.min(50, now - last); last = now;

  // soldier walking (only meaningful while playable)
  if (mode === MODE.PLAY && walking !== 0) {
    soldierX += walking * 0.10 * dt;
    if (soldierX < W * 0.42) soldierX = W * 0.42;   // can't walk into the prisoner
    if (soldierX > W + 50) {                         // walked off the right edge → mercy
      lockWalkAway();
    }
  }

  // ease the prisoner's slump after a shot
  if (mode === MODE.SHOT && slump < 1) {
    slump = Math.min(1, slump + dt / 900);
  }

  // muzzle flash decay
  if (muzzle > 0) muzzle = Math.max(0, muzzle - dt / 140);

  render();
  requestAnimationFrame(frame);
}

// grain animates on its own slow timer (not every frame — cheaper, filmic flicker)
setInterval(paintGrain, 90);

// ── Actions ──────────────────────────────────────────────────────────────────────
function unlock() {
  if (!started) {
    started = true;
    initAudio();
    // bring the scene up out of black on first interaction
    fadeEl.classList.remove("black");
    fadeEl.classList.add("clear");
  }
}

function fireGun() {
  if (mode !== MODE.PLAY || decided) return;
  decided = true;
  mode = MODE.SHOT;
  muzzle = 1;
  gunshot();
  prisonerDead = true;
  bloodShown = true;
  hideTouchControls();
  clearCaption();
  // save the irreversible outcome immediately
  storage.set("shot");
  // after the body settles, deliver the line, then fade and lock to the corpse
  setTimeout(() => {
    showCaption([
      { text: "You killed him." },
      { text: "There was never going to be another chance.", dim: true }
    ]);
  }, 2600);
  setTimeout(() => {
    mode = MODE.DEAD_PERM;
  }, 6000);
}

function startWalking(dir) {
  if (mode !== MODE.PLAY || decided) return;
  walking = dir;
}
function stopWalking() {
  if (walking !== 0) walking = 0;
}

function lockWalkAway() {
  if (decided) return;
  decided = true;
  mode = MODE.WALK;
  walking = 0;
  hideTouchControls();
  clearCaption();
  storage.set("spared");
  // fade gently, then settle into the permanent freed/empty-post state
  fadeEl.classList.remove("clear");
  fadeEl.classList.add("black");
  setTimeout(() => {
    mode = MODE.MERCY_PERM;
    soldierX = W + 200;
    render();
    fadeEl.classList.remove("black");
    fadeEl.classList.add("clear");
  }, 2200);
  setTimeout(() => {
    showCaption([
      { text: "You walked away." },
      { text: "He never saw your face. He is still out there, somewhere.", dim: true }
    ]);
  }, 4600);
}

function hideTouchControls() {
  ctlLeave.classList.remove("show");
  ctlFire.classList.remove("show");
}
function showTouchControls() {
  ctlLeave.classList.add("show");
  ctlFire.classList.add("show");
}

// ── Permanent-outcome boot ───────────────────────────────────────────────────────
function bootPermanentDead() {
  mode = MODE.DEAD_PERM;
  decided = true;
  prisonerDead = true;
  bloodShown = true;
  slump = 1;
  soldierX = W + 200;
  hideTouchControls();
  // fade up from black, then the damning line — no choice offered
  setTimeout(() => { unlock(); }, 50);
  setTimeout(() => {
    showCaption([
      { text: "You killed him." },
      { text: "There was never going to be another chance.", dim: true }
    ]);
  }, 2400);
}

function bootPermanentMercy() {
  mode = MODE.MERCY_PERM;
  decided = true;
  soldierX = W + 200;
  hideTouchControls();
  setTimeout(() => { unlock(); }, 50);
  setTimeout(() => {
    showCaption([
      { text: "The post is empty." },
      { text: "You let him live. He is still out there, somewhere.", dim: true }
    ]);
  }, 2400);
}

function bootChoosable() {
  mode = MODE.PLAY;
  decided = false;
  prisonerDead = false;
  bloodShown = false;
  slump = 0;
  soldierX = SOLDIER_START;
  // a long, quiet beat before any affordance appears — let them sit with it
  setTimeout(() => { if (mode === MODE.PLAY && started) showTouchControls(); }, 5200);
}

// ── Input ────────────────────────────────────────────────────────────────────────
// keyboard: arrows / A-D to move, Space / Enter to fire
window.addEventListener("keydown", (e) => {
  unlock();

  // secret reset: press R three times within 1.5s → clears outcome, returns to choice
  if (e.key === "r" || e.key === "R") {
    const now = performance.now();
    rKeyTimes = rKeyTimes.filter(t => now - t < 1500);
    rKeyTimes.push(now);
    if (rKeyTimes.length >= 3) {
      rKeyTimes = [];
      storage.clear();
      clearCaption();
      bootChoosable();
      showTouchControls();
      return;
    }
  }

  if (mode !== MODE.PLAY) return;

  if (e.code === "Space" || e.code === "Enter" || e.key === " ") {
    e.preventDefault();
    fireGun();
  } else if (e.code === "ArrowRight" || e.key === "d" || e.key === "D") {
    startWalking(1);
  } else if (e.code === "ArrowLeft" || e.key === "a" || e.key === "A") {
    startWalking(-1);
  }
});
window.addEventListener("keyup", (e) => {
  if (["ArrowRight", "ArrowLeft"].includes(e.code) || ["a","A","d","D"].includes(e.key)) {
    stopWalking();
  }
});

// click on the gun side / fire hotspot → fire
function pointInGun(clientX, clientY) {
  // map client coords to logical scene coords
  const r = cv.getBoundingClientRect();
  if (r.width === 0) return false;
  const sx = (clientX - r.left) / r.width * W;
  // the gun lives on the right portion of the scene
  return sx > W * 0.66;
}

cv.addEventListener("click", (e) => {
  unlock();
  if (mode !== MODE.PLAY) return;
  if (pointInGun(e.clientX, e.clientY)) fireGun();
});

// the explicit fire affordance (mobile-friendly)
function fireTap(e) { e.preventDefault(); e.stopPropagation(); unlock(); fireGun(); }
ctlFire.addEventListener("click", fireTap);
ctlFire.addEventListener("touchstart", fireTap, { passive: false });
fireHot.addEventListener("click", (e) => { unlock(); if (mode === MODE.PLAY) fireGun(); });
fireHot.addEventListener("touchstart", (e) => { e.preventDefault(); unlock(); if (mode === MODE.PLAY) fireGun(); }, { passive: false });

// the walk-away affordance: hold to walk left? No — tap/hold walks the soldier OFF
// (to the right, out of the scene). Press-and-hold to keep walking until he's gone.
function leaveStart(e) { e.preventDefault(); e.stopPropagation(); unlock(); startWalking(1); }
function leaveEnd(e) { e.preventDefault(); stopWalking(); }
ctlLeave.addEventListener("touchstart", leaveStart, { passive: false });
ctlLeave.addEventListener("touchend", leaveEnd, { passive: false });
ctlLeave.addEventListener("mousedown", leaveStart);
ctlLeave.addEventListener("mouseup", leaveEnd);
ctlLeave.addEventListener("mouseleave", leaveEnd);

// any first tap anywhere unlocks audio + reveals the scene
document.body.addEventListener("touchstart", () => unlock(), { passive: true, once: false });
document.body.addEventListener("mousedown", () => unlock());

// keep the fire hotspot aligned over the gun region
function layoutHotspots() {
  const r = cv.getBoundingClientRect();
  // gun region = right ~28% of the rendered scene, lower half
  fireHot.style.left = (r.left + r.width * 0.70) + "px";
  fireHot.style.top  = (r.top + r.height * 0.45) + "px";
  fireHot.style.width  = (r.width * 0.30) + "px";
  fireHot.style.height = (r.height * 0.55) + "px";
}
window.addEventListener("resize", layoutHotspots);

// ── Boot ─────────────────────────────────────────────────────────────────────────
function boot() {
  const saved = resetRequested ? null : storage.get();
  layoutHotspots();
  render();
  requestAnimationFrame(frame);

  if (saved === "shot") {
    bootPermanentDead();
  } else if (saved === "spared") {
    bootPermanentMercy();
  } else {
    // first-ever visit (or after ?reset / R R R): the choice is available.
    // Stay black until the player interacts (autoplay/audio policy + dramatic open).
    mode = MODE.PLAY;
    bootChoosable();
    // a single faint prompt only if they do nothing for a long while — never an
    // instruction, just enough that a confused user finds the affordances.
    setTimeout(() => { if (mode === MODE.PLAY && started) showTouchControls(); }, 5200);
  }
  // make sure layout settles after fonts/iframe sizing
  setTimeout(layoutHotspots, 200);
  setTimeout(layoutHotspots, 800);
}
boot();
</script>
</body>
</html>
