<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Day the Same Dream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #d8d6cf;
    --ink:   #2b2b2b;
    --dim:   #6a6a66;
    --line:  #9a9890;
    --accent:#b8453c;   /* the only colour in the world — used very sparingly */
  }

  html, body {
    height: 100%;
    background: #c9c7c0;
    color: var(--ink);
    font-family: 'VT323', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at center, #cfcdc6 60%, #aaa89f 100%);
  }

  /* The stage that holds the canvas — keeps a 16:9-ish framed window */
  #stage {
    position: relative;
    width: min(96vw, 880px);
    height: min(58vh, 460px);
    background: #b9b7b0;
    border: 1px solid #87857d;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 0 0 4px #cfcdc6;
    overflow: hidden;
  }

  #game {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* grain / vignette overlay over the canvas for that washed-out film feel */
  #stage::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(40,40,38,0.45) 100%);
    mix-blend-mode: multiply;
  }
  #stage::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    opacity: 0.06;
    background-image:
      repeating-linear-gradient(0deg, #000 0, #000 1px, transparent 1px, transparent 3px);
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 8;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 10px;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--dim);
    pointer-events: none;
  }
  #hud .loop { color: var(--ink); }
  #dev {
    display: flex; gap: 7px; align-items: center;
  }
  #dev .pip {
    width: 12px; height: 12px;
    border: 1.5px solid var(--dim);
    border-radius: 50%;
    background: transparent;
    display: inline-block;
  }
  #dev .pip.on {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 6px rgba(184,69,60,0.5);
  }

  #mute-btn {
    pointer-events: auto;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'VT323', monospace;
    font-size: 16px;
    padding: 1px 8px;
    cursor: pointer;
    line-height: 1.2;
  }
  #mute-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* Subtitle / narration band under the stage, inside the frame */
  #subtitle {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 8;
    text-align: center;
    font-size: 21px;
    letter-spacing: 0.5px;
    color: var(--ink);
    padding: 8px 16px 12px;
    min-height: 22px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #subtitle .who { color: var(--dim); }

  /* On-screen touch controls */
  #touch {
    position: relative;
    z-index: 4;
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    width: min(96vw, 880px);
    justify-content: center;
  }
  .tbtn {
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: var(--ink);
    background: #cfcdc6;
    border: 1px solid #8a887f;
    box-shadow: 0 3px 0 #9a9890;
    width: 64px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .tbtn:active { transform: translateY(3px); box-shadow: 0 0 0 #9a9890; }
  .tbtn.wide { width: auto; padding: 0 22px; font-size: 22px; letter-spacing: 1px; }
  .tbtn.act { color: var(--accent); border-color: #a86b66; }
  .tbtn.dim { opacity: 0.5; }

  #hint {
    position: relative;
    z-index: 4;
    margin-top: 8px;
    font-size: 16px;
    color: var(--dim);
    letter-spacing: 1px;
    text-align: center;
    height: 18px;
  }

  #credit {
    position: absolute;
    bottom: 4px; left: 0; right: 0;
    z-index: 4;
    text-align: center;
    color: #8c8a82;
    font-size: 12px;
    letter-spacing: 0.3px;
    opacity: 0.7;
    padding: 0 8px;
    font-family: 'VT323', monospace;
  }

  /* big centred title / end cards drawn over everything */
  #card {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(201,199,192,0.96);
    color: var(--ink);
    padding: 24px;
  }
  #card.show { display: flex; }
  #card h1 {
    font-size: 46px;
    font-weight: normal;
    letter-spacing: 2px;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  #card .sub { font-size: 22px; color: var(--dim); letter-spacing: 1px; margin-bottom: 26px; max-width: 540px; }
  #card .go {
    font-family: 'VT323', monospace;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--ink);
    background: transparent;
    border: 1px solid var(--ink);
    padding: 8px 30px;
    cursor: pointer;
  }
  #card .go:hover { background: var(--ink); color: var(--paper); }
  #card .go.acc { color: var(--accent); border-color: var(--accent); }
  #card .go.acc:hover { background: var(--accent); color: var(--paper); }
  #card .tiny { margin-top: 22px; font-size: 16px; color: var(--dim); opacity: 0.8; max-width: 520px; }

  @media (max-width: 560px) {
    #subtitle { font-size: 18px; }
    .tbtn { width: 54px; height: 50px; font-size: 22px; }
    #card h1 { font-size: 34px; }
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="loop" id="loop-label">DAY 1</div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div id="dev" title="acts of refusal">
          <span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span>
        </div>
        <button id="mute-btn" title="toggle sound">&#9834;</button>
      </div>
    </div>

    <div id="subtitle"></div>

    <div id="card">
      <h1 id="card-title">EVERY DAY<br>THE SAME DREAM</h1>
      <div class="sub" id="card-sub">a small game about a grey routine,<br>and the quiet ways out of it.</div>
      <button class="go" id="card-go">BEGIN</button>
      <div class="tiny" id="card-tiny">move: &larr; &rarr; or A D &nbsp;&middot;&nbsp; act: &uarr; / SPACE &nbsp;&middot;&nbsp; on phone use the buttons below</div>
    </div>
  </div>

  <div id="touch">
    <div class="tbtn" id="b-left">&larr;</div>
    <div class="tbtn act" id="b-act">&uarr;</div>
    <div class="tbtn" id="b-right">&rarr;</div>
  </div>
  <div id="hint"></div>

  <div id="credit">Tribute to Every Day the Same Dream by Molleindustria (Paolo Pedercini, 2009), CC BY-NC-SA. Not affiliated.</div>
</div>

<script>
"use strict";

// ─────────────────────────────────────────────────────────────────────────────
//  Every Day the Same Dream — a grey side-scroller about routine and refusal.
//  One file. Canvas pixel art, synthesized Web Audio, keyboard + touch.
// ─────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Low logical resolution; CSS upscales (pixelated).
const VW = 320, VH = 168;
canvas.width = VW; canvas.height = VH;
ctx.imageSmoothingEnabled = false;

// Muted near-monochrome palette (warm greys + one red).
const COL = {
  sky0:  '#cdcbC4',
  sky1:  '#bdbbb4',
  floor: '#a7a59d',
  floorD:'#94928a',
  wall0: '#c3c1ba',
  wall1: '#b4b2ab',
  wall2: '#a3a199',
  ink:   '#34332f',
  ink2:  '#4c4b46',
  mid:   '#76746d',
  light: '#dedcd5',
  white: '#e7e5de',
  red:   '#b8453c',
  redD:  '#8f352e',
  shadow:'rgba(40,40,38,0.18)'
};

const sub = document.getElementById('subtitle');
const hintEl = document.getElementById('hint');
const loopLabel = document.getElementById('loop-label');
const devPips = Array.from(document.querySelectorAll('#dev .pip'));
const card = document.getElementById('card');
const cardTitle = document.getElementById('card-title');
const cardSub = document.getElementById('card-sub');
const cardTiny = document.getElementById('card-tiny');
const cardGo = document.getElementById('card-go');

// ── persistent-ish progress (deviations found) — wrapped in try/catch ─────────
let store = {};
function loadStore() {
  try {
    const raw = localStorage.getItem('edtsd');
    if (raw) store = JSON.parse(raw) || {};
  } catch (e) { store = {}; }
}
function saveStore() {
  try { localStorage.setItem('edtsd', JSON.stringify(store)); } catch (e) {}
}
loadStore();

// Deviations: 5 small acts of refusal. Tracked across loops within a session.
const DEVIATIONS = ['undressed', 'field', 'beggar', 'pigeon', 'elevator'];
let found = {};           // resets each fresh session start
DEVIATIONS.forEach(d => found[d] = false);
function foundCount() { return DEVIATIONS.reduce((n,d)=>n+(found[d]?1:0),0); }

function updatePips() {
  let i = 0;
  for (const d of DEVIATIONS) {
    devPips[i].classList.toggle('on', !!found[d]);
    i++;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  AUDIO — synthesized only. Starts after first interaction.
// ─────────────────────────────────────────────────────────────────────────────
let actx = null, master = null, droneGain = null, muted = false, audioReady = false;

function initAudio() {
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    master = actx.createGain();
    master.gain.value = muted ? 0 : 0.85;
    master.connect(actx.destination);
    startDrone();
    audioReady = true;
  } catch (e) { actx = null; }
}

// A dull, low, fluorescent-hum drone — the sound of the routine.
function startDrone() {
  if (!actx) return;
  droneGain = actx.createGain();
  droneGain.gain.value = 0.035;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 360;
  droneGain.connect(lp);
  lp.connect(master);
  [49, 49.3, 98].forEach((f, i) => {
    const o = actx.createOscillator();
    o.type = i === 2 ? 'sine' : 'triangle';
    o.frequency.value = f;
    o.connect(droneGain);
    o.start();
  });
  // slow, sickly 60Hz-ish flutter
  const lfo = actx.createOscillator();
  const lg = actx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 0.09;
  lg.gain.value = 60;
  lfo.connect(lg); lg.connect(lp.frequency);
  lfo.start();
}

let _noise = null;
function noiseBuf() {
  if (_noise) return _noise;
  const len = Math.floor(actx.sampleRate * 0.05);
  _noise = actx.createBuffer(1, len, actx.sampleRate);
  const d = _noise.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _noise;
}

function tone(freq, dur, type='sine', gain=0.05, slideTo=null) {
  if (!actx || muted) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur + 0.02);
}

// footstep: soft filtered click
function step() {
  if (!actx || muted) return;
  const t = actx.currentTime;
  const s = actx.createBufferSource();
  s.buffer = noiseBuf();
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 280 + Math.random()*120; bp.Q.value = 1.1;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.05, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
  s.connect(bp); bp.connect(g); g.connect(master);
  s.start(t); s.stop(t + 0.08);
}

function uiBlip() { tone(520, 0.05, 'square', 0.04); }
function denyBlip() { tone(150, 0.14, 'sawtooth', 0.045); }

// a single muted chime — used when a deviation is collected
function chime() {
  tone(392, 0.5, 'sine', 0.05);
  setTimeout(()=>tone(523, 0.7, 'sine', 0.045), 90);
}
// a short, sad two-note for "fired / dream resets"
function resetSting() {
  tone(330, 0.22, 'triangle', 0.05);
  setTimeout(()=>tone(247, 0.5, 'triangle', 0.05), 180);
}
// the alarm clock — harsh, repeating, cut off when you stand
let alarmTimer = null;
function startAlarm() {
  stopAlarm();
  const beep = () => { tone(880, 0.09, 'square', 0.05); setTimeout(()=>tone(880,0.09,'square',0.05),140); };
  beep();
  alarmTimer = setInterval(beep, 620);
}
function stopAlarm() { if (alarmTimer) { clearInterval(alarmTimer); alarmTimer = null; } }

document.getElementById('mute-btn').addEventListener('click', () => {
  // first click also counts as the user gesture that unlocks audio
  if (!audioReady) initAudio();
  muted = !muted;
  if (master) master.gain.value = muted ? 0 : 0.85;
  document.getElementById('mute-btn').innerHTML = muted ? '&#9888;' : '&#9834;';
});

// ─────────────────────────────────────────────────────────────────────────────
//  SUBTITLE / narration helper
// ─────────────────────────────────────────────────────────────────────────────
let subTimer = null;
function say(text, who) {
  clearTimeout(subTimer);
  sub.style.opacity = '1';
  sub.innerHTML = (who ? `<span class="who">${who}: </span>` : '') + text;
}
function clearSay(after=0) {
  clearTimeout(subTimer);
  subTimer = setTimeout(()=>{ sub.style.opacity = '0'; }, after);
}
function setHint(h) { hintEl.textContent = h || ''; }

// ─────────────────────────────────────────────────────────────────────────────
//  INPUT — keyboard + touch, unified into a simple key state + "act" edge
// ─────────────────────────────────────────────────────────────────────────────
const keys = { left:false, right:false };
let actQueued = false;     // edge-triggered "interact"

function press(dir, on) { keys[dir] = on; }
function doAct() { if (!started) return; actQueued = true; }

window.addEventListener('keydown', (e) => {
  if (!audioReady) initAudio();
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') { keys.left = true; e.preventDefault(); }
  else if (k === 'arrowright' || k === 'd') { keys.right = true; e.preventDefault(); }
  else if (k === 'arrowup' || k === ' ' || k === 'w' || k === 'enter') { doAct(); e.preventDefault(); }
});
window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') keys.left = false;
  else if (k === 'arrowright' || k === 'd') keys.right = false;
});

function bindTouch(el, onDown, onUp) {
  const down = (e) => { e.preventDefault(); if (!audioReady) initAudio(); onDown(); };
  const up   = (e) => { e.preventDefault(); if (onUp) onUp(); };
  el.addEventListener('touchstart', down, { passive:false });
  el.addEventListener('touchend', up, { passive:false });
  el.addEventListener('touchcancel', up, { passive:false });
  el.addEventListener('mousedown', down);
  el.addEventListener('mouseup', up);
  el.addEventListener('mouseleave', up);
}
bindTouch(document.getElementById('b-left'),  () => press('left', true),  () => press('left', false));
bindTouch(document.getElementById('b-right'), () => press('right', true), () => press('right', false));
bindTouch(document.getElementById('b-act'),   () => { doAct(); }, null);

// ─────────────────────────────────────────────────────────────────────────────
//  PIXEL DRAWING HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, w|0, h|0); }
function dotN(x, y, c) { ctx.fillStyle = c; ctx.fillRect(x|0, y|0, 1, 1); }

// deterministic prng
function rng(seed) { let s = seed>>>0 || 1; return () => (s = (s*1664525 + 1013904223)>>>0) / 4294967296; }

// ── The protagonist: a small grey office man (or in underwear) ────────────────
// drawn at feet position (fx, fy); facing dir (+1 right / -1 left); walkPhase animates legs
function drawMan(fx, fy, dir, walkPhase, opts={}) {
  fx = Math.round(fx); fy = Math.round(fy);
  const underwear = !!opts.underwear;
  const skin = '#b9b3a9';
  const suit = underwear ? '#bdbbb4' : COL.ink2;   // bare torso vs suit
  const shirt = underwear ? '#cfcdc6' : '#7c7a73';
  const head = skin;
  // legs (animated) — two pixels apart, swinging
  const swing = Math.round(Math.sin(walkPhase) * 2);
  const legCol = underwear ? COL.ink2 : COL.ink;   // dark trousers / dark briefs line
  // left leg
  px(fx - 2, fy - 7 + (swing>0?0:0), 2, 7, legCol);
  px(fx - 2, fy - 1, 2 + swing, 1, COL.ink);       // foot
  // right leg
  px(fx + 1, fy - 7, 2, 7, legCol);
  px(fx + 1, fy - 1, 2 - swing, 1, COL.ink);
  // torso
  px(fx - 3, fy - 15, 6, 8, suit);
  if (!underwear) {
    px(fx - 1, fy - 15, 2, 7, shirt);              // shirt placket / tie gap
    // tiny red tie — a thread of colour
    px(fx - 1, fy - 13, 1, 4, COL.red);
  } else {
    px(fx - 3, fy - 9, 6, 2, '#cfcdc6');           // waistband of briefs
  }
  // arms (slight swing opposite the legs)
  const aSwing = -swing;
  px(fx + (dir>0? 3 : -4), fy - 14, 1, 6 + Math.abs(aSwing), suit);
  // head + neck
  px(fx - 1, fy - 17, 2, 2, skin);                 // neck
  px(fx - 3, fy - 23, 6, 6, head);                 // head
  // hair — flat, grey, receding
  px(fx - 3, fy - 23, 6, 2, COL.mid);
  px(fx + (dir>0?2:-3), fy - 21, 1, 1, COL.mid);
  // face: a single eye dot, blank
  px(fx + (dir>0? 1 : -1), fy - 20, 1, 1, COL.ink);
  // mouth — flat line
  px(fx - 1, fy - 18, 2, 1, COL.ink2);
}

// a shadow blob under the man
function manShadow(fx, fy) {
  ctx.fillStyle = COL.shadow;
  ctx.fillRect((fx-6)|0, (fy-1)|0, 12, 2);
}

// ─────────────────────────────────────────────────────────────────────────────
//  WORLD STATE
// ─────────────────────────────────────────────────────────────────────────────
let started = false;
let day = 1;
const GROUND = 150;       // feet baseline in scenes that have a floor

// player world position (scene-space), scroll camera follows
let player = { x: 60, vx: 0, walk: 0, underwear: false };
let camX = 0;

// Scene system. Each scene defines its width, draw(t,cam), update, and interactables.
let scene = null;
let sceneTime = 0;
let transition = 0;     // 0..1 fade overlay (1 = black-ish)
let transitioning = false;
let inputLock = false;  // disable movement during scripted beats

// interactables in current scene: {x, range, hint, done, action}
let interacts = [];
let activeInteract = null;

// ── fade transition between scenes ───────────────────────────────────────────
function fadeTo(buildFn, dur=520) {
  if (transitioning) return;
  transitioning = true;
  inputLock = true;
  let start = performance.now();
  function up(now) {
    let p = Math.min(1, (now - start) / (dur/2));
    transition = p;
    if (p < 1) { requestAnimationFrame(up); }
    else {
      buildFn();
      start = performance.now();
      requestAnimationFrame(down);
    }
  }
  function down(now) {
    let p = Math.min(1, (now - start) / (dur/2));
    transition = 1 - p;
    if (p < 1) { requestAnimationFrame(down); }
    else { transition = 0; transitioning = false; inputLock = false; }
  }
  requestAnimationFrame(up);
}

// ─────────────────────────────────────────────────────────────────────────────
//  BACKDROP PRIMITIVES (reused across scenes)
// ─────────────────────────────────────────────────────────────────────────────
function drawFloor(cam, y, c1, c2) {
  px(0, y, VW, VH - y, c1);
  // simple tile seams scrolling with camera
  for (let x = -((cam) % 24); x < VW; x += 24) {
    px(x, y, 1, VH - y, c2);
  }
  px(0, y, VW, 1, c2);
}

function drawWallpaper(cam, c0, c1) {
  // gradient-ish bands
  px(0, 0, VW, VH, c0);
  for (let y = 0; y < VH; y += 6) {
    if (((y/6)|0) % 2 === 0) px(0, y, VW, 3, c1);
  }
  // faint vertical seams
  for (let x = -((cam*0.5) % 40); x < VW; x += 40) px(x, 0, 1, VH, COL.wall2);
}

// ─────────────────────────────────────────────────────────────────────────────
//  SCENES
//  Flow per day:  BEDROOM -> HALLWAY/ELEVATOR -> STREET(traffic) -> OFFICE -> (reset)
//  Each day one extra deviation becomes reachable. Collect 5 -> ROOF ending.
// ─────────────────────────────────────────────────────────────────────────────

// SCENE: BEDROOM — wake, partner reminds you, mirror/wardrobe to get dressed.
function buildBedroom() {
  scene = { id:'bedroom', w: 360, draw: drawBedroom, update: updateBedroom };
  player.x = 70; player.walk = 0;
  player.underwear = true;       // you wake in underwear; getting dressed is normal
  camX = 0;
  sceneTime = 0;
  interacts = [];

// ─────────────────────────────────────────────────────────────────────────────
//  SHARED MOVEMENT + INTERACTION
// ─────────────────────────────────────────────────────────────────────────────
let facing = 1;
function walkAndInteract(dt) {
  if (inputLock || transitioning) { player.walk *= 0.8; return; }

  let speed = 64; // px/sec in world space
  let moving = false;
  if (keys.left)  { player.x -= speed*dt; facing = -1; moving = true; }
  if (keys.right) { player.x += speed*dt; facing =  1; moving = true; }

  // clamp to scene bounds
  player.x = Math.max(16, Math.min(scene.w - 16, player.x));

  if (moving) {
    player.walk += dt * 12;
    // footstep audio cadence
    if (Math.floor(player.walk/Math.PI) !== Math.floor((player.walk - dt*12)/Math.PI)) step();
  } else {
    player.walk *= 0.7;
  }

  // camera follows player, clamped to scene
  let target = player.x - VW/2;
  target = Math.max(0, Math.min(scene.w - VW, target));
  camX += (target - camX) * Math.min(1, dt*8);

  // find nearest interactable in range
  activeInteract = null;
  let best = 1e9;
  for (const it of interacts) {
    if (it.done) continue;
    let d = Math.abs(player.x - it.x);
    if (d <= it.range && d < best) { best = d; activeInteract = it; }
  }

  if (activeInteract) {
    setHint(activeInteract.hint.replace('[up]', isTouch()? 'tap &uarr;' : '&uarr; / SPACE'));
  } else {
    setHint(sceneDefaultHint());
  }

  // consume an act
  if (actQueued) {
    actQueued = false;
    if (activeInteract) {
      activeInteract.action();
      uiBlip();
      // some interacts are one-shot
    } else {
      // pressing act with nothing nearby — small flavour deny (no penalty)
      denyBlip();
    }
  }
}

function sceneDefaultHint() {
  if (!scene) return '';
  switch (scene.id) {
    case 'bedroom': return 'walk &rarr; &middot; &uarr; to act';
    case 'hallway': return 'reach the elevator';
    case 'street':  return 'keep walking, or get in the car';
    case 'office':  return foundCount()>=5 ? 'a door waits at the end' : 'find your desk';
    case 'roof':    return 'walk toward the edge';
    default: return '';
  }
}

function isTouch() {
  return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
}

function drawPlayer(cam) {
  let fx = player.x - cam;
  let fy = GROUND;
  manShadow(fx, fy);
  drawMan(fx, fy, facing, player.walk, { underwear: player.underwear });
}

// ─────────────────────────────────────────────────────────────────────────────
//  DEVIATION COLLECTION
// ─────────────────────────────────────────────────────────────────────────────
function collectDeviation(key, line) {
  if (found[key]) return;
  found[key] = true;
  store[key] = true; saveStore();
  updatePips();
  chime();
  if (activeInteract) activeInteract.done = true;
  flashAccent = 1;
  say(line);
  clearSay(4200);
  // little subtitle of progress
  setTimeout(() => {
    let n = foundCount();
    if (n < 5) { say(n + ' of 5. Something is loosening.'); clearSay(2600); }
    else { say('Five. You feel the dream thinning.'); clearSay(3000); }
  }, 4300);
}

// brief desaturation->colour flash when a deviation lands
let flashAccent = 0;

// ─────────────────────────────────────────────────────────────────────────────
//  END CARD
// ─────────────────────────────────────────────────────────────────────────────
function showEndCard() {
  card.classList.add('show');
  cardTitle.innerHTML = 'THE LOOP<br>BREAKS';
  cardSub.innerHTML = 'You did not escape the world.<br>You stopped agreeing to it.';
  cardTiny.innerHTML = 'Five small refusals. One step off the edge.<br>Every day was the same dream — until it wasn\'t.';
  cardGo.textContent = 'DREAM AGAIN';
  cardGo.classList.add('acc');
  cardGo.onclick = () => restartAll();
}

function restartAll() {
  // fresh session: reset deviations and day
  DEVIATIONS.forEach(d => found[d] = false);
  updatePips();
  day = 1;
  loopLabel.textContent = 'DAY 1';
  card.classList.remove('show');
  cardGo.classList.remove('acc');
  buildBedroom();
}

// ─────────────────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
let last = performance.now();
function frame(now) {
  let dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  sceneTime += dt;

  if (started && scene) {
    scene.update(dt);
    // render
    ctx.clearRect(0,0,VW,VH);
    scene.draw(camX);

    // deviation accent flash — a soft red bloom fading out
    if (flashAccent > 0) {
      ctx.globalAlpha = flashAccent * 0.18;
      ctx.fillStyle = COL.red;
      ctx.fillRect(0,0,VW,VH);
      ctx.globalAlpha = 1;
      flashAccent = Math.max(0, flashAccent - dt*0.8);
    }

    // transition fade overlay
    if (transition > 0) {
      ctx.globalAlpha = transition;
      ctx.fillStyle = '#1d1d1b';
      ctx.fillRect(0,0,VW,VH);
      ctx.globalAlpha = 1;
    }
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─────────────────────────────────────────────────────────────────────────────
//  TITLE / START
// ─────────────────────────────────────────────────────────────────────────────
function start() {
  initAudio();
  started = true;
  card.classList.remove('show');
  day = 1;
  loopLabel.textContent = 'DAY 1';
  DEVIATIONS.forEach(d => found[d] = false);
  updatePips();
  buildBedroom();
}

cardGo.addEventListener('click', () => { if (!started) start(); });
// also allow keypress / tap anywhere on the card to begin
card.addEventListener('click', (e) => { if (!started && e.target === card) start(); });
window.addEventListener('keydown', (e) => {
  if (!started && (e.key === 'Enter' || e.key === ' ')) { start(); e.preventDefault(); }
}, { once:false });

// show the title card initially
card.classList.add('show');
updatePips();

// draw a faint idle backdrop behind the title so it isn't blank
(function idleBackdrop(){
  ctx.clearRect(0,0,VW,VH);
  drawWallpaper(0, COL.wall1, COL.wall0);
  drawFloor(0, GROUND, COL.floor, COL.floorD);
  // a still silhouette of the man, asleep-standing
  manShadow(160, GROUND);
  drawManSilhouette(160, GROUND, 1);
})();
</script>
</body>
