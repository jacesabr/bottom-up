services:
  - type: web
    name: bottom-up-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node_modules/.bin/tsx src/api/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # NVIDIA NIM is the primary model for all traffic (free). No mock / no silent fallback: a NIM
      # failure surfaces a graceful "temporarily unavailable" message + an admin error-log entry.
      # Set to 'claude' (and provide ANTHROPIC_API_KEY) only as a deliberate manual override.
      - key: LLM_PROVIDER
        value: nvidia
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Admin panel (#admin route) — HTTP Basic auth. Set in the dashboard; if unset, /admin returns 503.
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: bottom-up-web
    runtime: static
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist/web
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
