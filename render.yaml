services:
  - type: web
    name: bottom-up-api
    env: node
    plan: standard
    buildCommand: npm install && npm run build:api
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 3030
      - key: DATABASE_URL
        fromDatabase:
          name: bottom-up-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false

  - type: static_site
    name: bottom-up-web
    buildCommand: npm install && npm run build:web
    staticPublishPath: dist/web
    routes:
      - path: /api/*
        destination: https://bottom-up-api.onrender.com:3030/api/$path
      - path: /*
        destination: /index.html

databases:
  - name: bottom-up-db
    databaseName: bottom_up
    user: neon_user
    plan: free
